{% extends 'base.html' %}
{% block title %}Login | Ames Valuer AI{% endblock %}
{% block page_title %}Account Login{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="glass-card shadow-lg p-4">
            <div class="text-center mb-4">
                <div class="icon-box mx-auto d-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle" style="width: 60px; height: 60px; font-size: 1.8rem;">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <h3 class="fw-bold mt-3">Welcome Back</h3>
                <p class="text-secondary small">Enter your credentials to access the valuation dashboard</p>
            </div>
            
            <form method="POST" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle" style="color: var(--text-secondary);"><i class="fa-solid fa-user"></i></span>
                        <input type="text" name="username" autofocus maxlength="150" class="form-control border-start-0" placeholder="Username" required id="id_username">
                    </div>
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label for="id_password" class="form-label mb-0">Password</label>
                        <a href="{% url 'password_reset' %}" class="small text-decoration-none text-primary fw-medium">Forgot?</a>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary-subtle" style="color: var(--text-secondary);"><i class="fa-solid fa-key"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Password" required id="id_password">
                    </div>
                </div>
                
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-custom py-2.5 fw-bold">Sign In</button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <span class="text-secondary small">Don't have an account?</span>
                <a href="{% url 'register' %}" class="text-decoration-none text-primary small fw-semibold ms-1">Register here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
