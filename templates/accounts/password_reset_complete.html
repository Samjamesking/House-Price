{% extends 'base.html' %}
{% block title %}Password Reset Complete | Ames Valuer AI{% endblock %}
{% block page_title %}Success{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="glass-card shadow-lg p-4 text-center">
            <div class="icon-box mx-auto d-flex align-items-center justify-content-center bg-success-subtle text-success rounded-circle" style="width: 60px; height: 60px; font-size: 1.8rem;">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h3 class="fw-bold mt-4">Reset Successful</h3>
            <p class="text-secondary small mt-2">
                Your password has been changed successfully. You can now use your new password to sign in.
            </p>
            
            <hr class="my-4 border-secondary-subtle">
            
            <a href="{% url 'login' %}" class="btn btn-custom w-100 fw-bold py-2.5">Sign In Now</a>
        </div>
    </div>
</div>
{% endblock %}
